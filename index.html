<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
</head>
<body class="d-flex justify-content-center align-items-center vh-100">

<div class="card-box">
    <img src="images/nittany_lionLogo.jpg" alt="logo" class="logo-img">
    <h3 class="text-center mb-3">Member Login</h3>

    <form onsubmit="login(event)">
        <div class="mb-3">
            <label>Email</label>
            <input type="email" id="loginEmail" class="form-control">
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password" id="loginPassword" class="form-control">
        </div>

        <button class="btn btn-psu w-100">Log In</button>
        <a href="signup.html" class="btn btn-outline-dark w-100 mt-2">Sign Up</a>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
