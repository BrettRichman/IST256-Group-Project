<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PSU IST Tutor Portal</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar p-3">
    <span class="navbar-brand ms-3 text-white fw-bold">PSU Member Portal</span>
</nav>

<div class="home-hero">

    <div class="home-logo-wrap">
        <img src="images/nittany_lionLogo.jpg" alt="Nittany Lion Logo" class="home-logo">
    </div>

    <h1 class="home-title">PSU IST Tutor Portal</h1>
    <p class="home-subtitle">Student resources page for IST students</p>

    <p class="home-status" id="statusMessage"></p>

    <!-- When not logged in -->
    <div class="home-card-row" id="loggedOutCards" style="display: none;">
        <a href="login.html" class="home-card home-card-primary">
            <div class="home-card-icon">🔐</div>
            <div>Log In</div>
        </a>
        <a href="signup.html" class="home-card">
            <div class="home-card-icon">📋</div>
            <div>Sign Up</div>
        </a>
    </div>

    <!-- Shown when logged in -->
    <div class="home-card-row" id="loggedInCards" style="display: none;">
        <a href="members.html" class="home-card home-card-primary">
            <div class="home-card-icon">👥</div>
            <div>Member Directory</div>
        </a>
        <a href="products.html" class="home-card">
            <div class="home-card-icon">📦</div>
            <div>Products</div>
        </a>
        <a href="#" class="home-card" onclick="logout()">
            <div class="home-card-icon">🚪</div>
            <div>Log Out</div>
        </a>
    </div>

</div>

<footer>
    &copy; 2026 Penn State Member Portal &mdash; IST256 Group Project
</footer>

<script src="script.js"></script>
<script>
    /* Check if user is logged in and show the right cards */
    function initHomepage() {
        var isLoggedIn = sessionStorage.getItem('isLoggedIn');
        var email = sessionStorage.getItem('currentUserEmail');

        if (isLoggedIn === 'true') {
            document.getElementById('statusMessage').innerText = 'Logged in as: ' + email;
            document.getElementById('loggedInCards').style.display = 'flex';
            document.getElementById('loggedOutCards').style.display = 'none';
        } else {
            document.getElementById('statusMessage').innerText = 'You are not currently logged in.';
            document.getElementById('loggedOutCards').style.display = 'flex';
            document.getElementById('loggedInCards').style.display = 'none';
        }
    }

    initHomepage();
</script>

<a href="cart.html" class="home-card">
    <div class="home-card-icon">🛒</div>
    <div>Shopping Cart</div>
</a>

</body>
</html>
