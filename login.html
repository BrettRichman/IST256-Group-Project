<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - PSU Member Portal</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="script.js"></script>
</head>
<body class="d-flex flex-column min-vh-100">

<nav class="navbar p-3">
    <a href="index.html" class="navbar-brand ms-3">PSU Member Portal</a>
</nav>

<div class="d-flex justify-content-center align-items-center flex-grow-1">
    <div class="card-box login-box">
        <img src="images/nittany_lionLogo.jpg" alt="logo" class="logo-img">
        <h3 class="text-center mb-3">Member Login</h3>

        <form onsubmit="login(event)" method="post">
            <div class="mb-3">
                <label>Email</label>
                <input type="email" id="loginEmail" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Password</label>
                <input type="password" id="loginPassword" class="form-control" required>
            </div>
            <button class="btn btn-psu w-100" type="submit">Log In</button>
            <a href="signup.html" class="btn btn-outline-dark w-100 mt-2">Sign Up</a>
            <a href="index.html" class="d-block text-center mt-2">Back to Home</a>
        </form>
    </div>
</div>

<footer>
    &copy; 2025 Penn State Member Portal &mdash; IST256 Group Project
</footer>

</body>
</html>
