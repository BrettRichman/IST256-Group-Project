<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - PSU Member Portal</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="script.js"></script>
</head>
<body>

<nav class="navbar p-3">
    <a href="index.html" class="navbar-brand ms-3">PSU Member Portal</a>
</nav>

<div class="container mt-5 signup-container">
    <div class="card-box">
        <h3 class="mb-4">Member Sign Up</h3>

        <form onsubmit="signUp(event)" method="post">
            <input type="text"     id="name"            class="form-control mb-3" placeholder="Full Name" required>
            <input type="email"    id="email"           class="form-control mb-3" placeholder="Email" required>
            <input type="text"     id="phone"           class="form-control mb-3" placeholder="Phone Number (Optional)">
            <input type="text"     id="year"            class="form-control mb-3" placeholder="Graduation Year" required>
            <input type="text"     id="address"         class="form-control mb-3" placeholder="Address / Affiliation" required>
            <input type="password" id="password"        class="form-control mb-3" placeholder="Password" required>
            <input type="password" id="confirmPassword" class="form-control mb-3" placeholder="Confirm Password" required>
            <button class="btn btn-psu w-100" type="submit">Sign Up</button>
            <a href="index.html" class="d-block text-center mt-2">Back to Home</a>
        </form>
    </div>
</div>

<footer>
    &copy; 2025 Penn State Member Portal &mdash; IST256 Group Project
</footer>

</body>
</html>
