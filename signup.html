<!DOCTYPE html>

<html>
<head>
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar p-3">
    <a href="index.html" class="navbar-brand ms-3">Back to Login</a>
</nav>

<div class="container mt-5">
    <div class="card-box">
        <h3 class="mb-4">Member Sign Up</h3>

        <form onsubmit="signUp(event)">
            <input type="text" id="name" class="form-control mb-3" placeholder="Full Name">
            <input type="email" id="email" class="form-control mb-3" placeholder="Email">
            <input type="text" id="phone" class="form-control mb-3" placeholder="Phone Number (Optional)">
            <input type="text" id="year" class="form-control mb-3" placeholder="Graduation Year">
            <input type="text" id="address" class="form-control mb-3" placeholder="Address / Affiliation">
            <input type="password" id="password" class="form-control mb-3" placeholder="Password">
            <input type="password" id="confirmPassword" class="form-control mb-3" placeholder="Confirm Password">

            <button class="btn btn-psu">Sign Up</button>
        </form>
    </div>
</div>

<script src="script.js"></script>
</body>


</html>
