<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products - PSU Member Portal</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
</head>
<body onload="requireAuth(); loadProducts();">

<header>
    <nav class="navbar navbar-expand-lg container">
        <a class="navbar-brand text-white fw-bold" href="index.html">PSU Member Portal</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link" href="members.html">Members</a>
            <a class="nav-link" href="#" onclick="logout()">Logout</a>
        </div>
    </nav>
</header>

<div class="container mt-5">

    Add / Update Product Form
    <div class="card-box mb-4">
        <h3 class="mb-3">Add / Update Product</h3>
        <form id="productForm" onsubmit="addOrUpdateProduct(event)">
            <div class="row mb-2">
                <div class="col-md-4">
                    <input type="text" id="itemId" class="form-control" placeholder="ID Number" required>
                </div>
                <div class="col-md-4">
                    <input type="text" id="format" class="form-control" placeholder="Name" required>
                </div>
            </div>
            <div class="row mb-2">
                <div class="col-md-8">
                    <input type="text" id="description" class="form-control" placeholder="Description" required>
                </div>
                <div class="col-md-4">
                    <input type="text" id="category" class="form-control" placeholder="Category" required>
                </div>
            </div>
            <div class="row mb-2">
                <div class="col-md-4">
                    <input type="number" id="price" class="form-control" placeholder="Price" required>
                </div>
                <div class="col-md-8">
                    <input type="text" id="additional" class="form-control" placeholder="Additional Info (Optional)">
                </div>
            </div>
            <button class="btn btn-psu" type="submit">Add / Update Product</button>
        </form>
    </div>

    Search Bar
    <div class="mb-3">
        <input type="text" id="searchInput" class="form-control" placeholder="Search products...">
    </div>

    Product Table
    <div class="card-box">
        <table class="table table-bordered" id="productTable">
            <thead>
                <tr>
                    <th>ID Number</th>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Additional Info</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

</div>

<footer>
    &copy; 2025 Penn State Member Portal &mdash; IST256 Group Project
</footer>

<script src="script.js"></script>
</body>
</html>
